<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de viajes</title>
</head>
<body>
    <h1>Formulario para viaje vacacional</h1>

    <form>
        <fieldset>
        <label for="nombre">Nombres:</label>
        <input type="text" id="nombre" name="nombre">
        <label for="Apellidos">Apellidos:</label>
        <input type="text" id="Apellidos" name="Apellidos">
        <br>
        

     
     <label for="correo">Correo Electronico:</label>
     <input type="email" name="correo" id="correo" placeholder="inmerELNENE@icloud" > 
     <label for="">Numero de telefono:</label>
     <input type="text" name="telefono" id="telefono"> 
     <br>

     <label for="integrantes">Numero de integrantes:</label>
     <input type="number" name="integrantes" id="integrantes" step="1" max="5" min="0">
     <br>
     
     <label for="origen">Lugar de origen</label>
     <input type="text" name="origen" id="origen" value="San salvador" readonly>
     <br>

     <label for="destino">Lugar de destino:</label>
     <select name="destino" id="destino">
        <option value="Lauterbrunnen">Lauterbrunnen</option>
        <option value="Venecia">Venecia</option>
        <option value="Barcelona">Barcelona</option>
        <option value="Florencia">Florencia</option>
        
     </select>














     <br>
     <input type="submit" value="registrarse">
        <input type="reset" value="borrar">
     </fieldset>
    </form>
</body>
</html>
